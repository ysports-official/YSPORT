name: Android APK Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ysports-mobile/package-lock.json

      - name: 🛠️ Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: 📦 Install Dependencies
        working-directory: ysports-mobile
        run: npm ci --legacy-peer-deps

      - name: 🔧 Expo Prebuild
        working-directory: ysports-mobile
        run: npx expo prebuild --platform android --clean --no-install

      - name: 🏗️ Build APK
        working-directory: ysports-mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: 🚀 GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_NUM: ${{ github.run_number }}
          COMMIT_SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG="build-${RUN_NUM}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          NOTES="Branch: ${REF_NAME} | Commit: ${SHORT_SHA}"
          gh release create "$TAG" \
            ysports-mobile/android/app/build/outputs/apk/release/app-release.apk \
            --title "Build #${RUN_NUM} - ${SHORT_SHA}" \
            --notes "$NOTES" \
            --prerelease \
            --repo ysports-official/YSPORT

      - name: Build Summary
        if: success()
        env:
          RUN_NUM: ${{ github.run_number }}
        run: |
          echo "Build ${RUN_NUM} done" >> $GITHUB_STEP_SUMMARY
          echo "Release: https://github.com/ysports-official/YSPORT/releases/tag/build-${RUN_NUM}" >> $GITHUB_STEP_SUMMARY

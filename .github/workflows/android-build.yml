name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Expo CLI
        run: npm install -g eas-cli expo-cli

      - name: Install Dependencies
        working-directory: ./ysports-mobile
        run: npm install --legacy-peer-deps

      - name: Fix native package versions for Expo SDK 56 + RN 0.85
        working-directory: ./ysports-mobile
        run: |
          npx expo install react-native-screens react-native-safe-area-context react-native-gesture-handler react-native-webview
          npm install --legacy-peer-deps

      - name: Run Expo Prebuild
        working-directory: ./ysports-mobile
        run: npx expo prebuild --platform android --clean --no-install

      - name: Build APK with Gradle
        working-directory: ./ysports-mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ysports-apk
          path: ./ysports-mobile/android/app/build/outputs/apk/release/app-release.apk

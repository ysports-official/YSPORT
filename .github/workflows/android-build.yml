name: EAS Android Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build Profile (preview: APK debug, production: AAB)'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

permissions:
  contents: write

jobs:
  build:
    name: Build Android (${{ github.event.inputs.profile || 'preview' }})
    runs-on: self-hosted

    steps:
      - name: 🔧 Git Bash + Java + Android PATH (Windows runner)
        shell: powershell
        run: |
          Add-Content $env:GITHUB_PATH "C:\Program Files\Git\bin"
          Add-Content $env:GITHUB_PATH "C:\Program Files\Git\usr\bin"
          $javaHome    = "$env:LOCALAPPDATA\Java\jdk-17.0.11+9"
          $androidHome = "$env:LOCALAPPDATA\Android\Sdk"
          Add-Content $env:GITHUB_ENV  "JAVA_HOME=$javaHome"
          Add-Content $env:GITHUB_ENV  "ANDROID_HOME=$androidHome"
          Add-Content $env:GITHUB_PATH "$javaHome\bin"
          Add-Content $env:GITHUB_PATH "$androidHome\platform-tools"
          Add-Content $env:GITHUB_PATH "$androidHome\cmdline-tools\latest\bin"
          Write-Host "JAVA_HOME = $javaHome"
          Write-Host "ANDROID_HOME = $androidHome"

      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 🚀 Install EAS CLI
        run: npm install -g eas-cli

      - name: 📦 Install Project Dependencies
        working-directory: ./ysports-mobile
        run: npm install --legacy-peer-deps

      - name: 🔩 Android NDK Kontrol & Kurulum
        shell: powershell
        run: |
          $androidHome = "$env:LOCALAPPDATA\Android\Sdk"
          $ndkVer      = "27.1.12297006"
          $ndkPath     = "$androidHome\ndk\$ndkVer"
          if (Test-Path "$ndkPath\source.properties") {
            Write-Host "NDK OK: $ndkVer"
          } else {
            Write-Host "NDK eksik, kuruluyor..."
            $env:JAVA_HOME    = "$env:LOCALAPPDATA\Java\jdk-17.0.11+9"
            $env:ANDROID_HOME = $androidHome
            $env:PATH         = "$env:JAVA_HOME\bin;$androidHome\cmdline-tools\latest\bin;$env:PATH"
            cmd /c "`"$androidHome\cmdline-tools\latest\bin\sdkmanager.bat`" `"ndk;$ndkVer`""
            if ((Test-Path "$androidHome\ndk\$ndkVer-2") -and !(Test-Path "$ndkPath\source.properties")) {
              Rename-Item "$androidHome\ndk\$ndkVer-2" $ndkVer
            }
            Write-Host "NDK kuruldu: $(Test-Path `"$ndkPath\source.properties`")"
          }

      - name: 🏗️ Expo Prebuild (native Android project oluştur)
        shell: bash
        working-directory: ./ysports-mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npx expo prebuild --platform android --non-interactive --clean
          echo "Prebuild tamamlandı."
          ls android/app/

      - name: 📏 Windows MAX_PATH fix — kısa CMake build dizini
        shell: bash
        working-directory: ./ysports-mobile
        run: |
          # ninja .o dosya path'leri 260 char'ı aşıyor.
          # android.cxx.dir=C:/cxx ile CMake build dizinini kısaltıyoruz (admin gerektirmez).
          echo "" >> android/gradle.properties
          echo "# Windows MAX_PATH fix" >> android/gradle.properties
          echo "android.cxx.dir=C:/cxx" >> android/gradle.properties
          echo "gradle.properties güncellendi:"
          tail -4 android/gradle.properties

      - name: 🔨 Gradle Build
        shell: bash
        working-directory: ./ysports-mobile/android
        env:
          JAVA_HOME:    ${{ env.JAVA_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          echo "Profile: $PROFILE"

          KEYSTORE_WIN=$(powershell.exe -Command "echo \$env:USERPROFILE" | tr -d '\r')
          KEYSTORE="$KEYSTORE_WIN/.android/debug.keystore"

          if [ "$PROFILE" = "production" ]; then
            echo "AAB (bundleRelease) build başlatılıyor..."
            ./gradlew bundleRelease --no-daemon \
              -Pandroid.injected.signing.store.file="$KEYSTORE" \
              -Pandroid.injected.signing.store.password=android \
              -Pandroid.injected.signing.key.alias=androiddebugkey \
              -Pandroid.injected.signing.key.password=android
            cp app/build/outputs/bundle/release/app-release.aab ../../app-release.aab
            echo "BUILD_EXT=aab" >> $GITHUB_ENV
          else
            echo "APK (assembleRelease) build başlatılıyor..."
            ./gradlew assembleRelease --no-daemon \
              -Pandroid.injected.signing.store.file="$KEYSTORE" \
              -Pandroid.injected.signing.store.password=android \
              -Pandroid.injected.signing.key.alias=androiddebugkey \
              -Pandroid.injected.signing.key.password=android
            cp app/build/outputs/apk/release/app-release.apk ../../app-release.apk
            echo "BUILD_EXT=apk" >> $GITHUB_ENV
          fi

          ls -lh ../../app-release.*

      - name: 🚀 GitHub Release olarak yayınla
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          TAG="build-${{ github.run_number }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"

          gh release create "$TAG" app-release.* \
            --title "Build #${{ github.run_number }} • ${PROFILE} • ${SHORT_SHA}" \
            --notes "**Branch:** ${{ github.ref_name }}
          **Commit:** ${{ github.sha }}
          **Profile:** ${PROFILE}

          > APK indirmek için aşağıdaki Assets bölümünü kullanın." \
            --prerelease \
            --repo ysports-official/YSPORT

      - name: ✅ Build Summary
        if: success()
        shell: bash
        run: |
          echo "## ✅ Build #${{ github.run_number }} Tamamlandı" >> $GITHUB_STEP_SUMMARY
          echo "📦 **Release:** https://github.com/ysports-official/YSPORT/releases/tag/build-${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "⬇️ APK'yı Releases sayfasından indir" >> $GITHUB_STEP_SUMMARY

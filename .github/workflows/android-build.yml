name: EAS Android Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build Profile (preview: APK, production: AAB)'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Android (${{ github.event.inputs.profile || 'preview' }})
    runs-on: ubuntu-latest

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # NDK'yı Gradle'dan önce pre-install et → ZipFile corruption hatası önlenir
      - name: 🤖 Pre-install Android NDK 27.1.12297006
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.1.12297006" || \
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.1.12297006"

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ysports-mobile/package-lock.json

      - name: 🛠️ Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      # expo/expo-github-action — EAS CLI cache, resmi auth entegrasyonu
      - name: 🚀 Setup EAS CLI (cached)
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          eas-cache: true

      # npm ci — npm install'dan daha hızlı, package-lock.json'a göre deterministic
      - name: 📦 Install Project Dependencies
        working-directory: ysports-mobile
        run: npm ci --legacy-peer-deps

      - name: 🏗️ EAS Local Build
        working-directory: ysports-mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          if [ "$PROFILE" = "production" ]; then
            EXT="aab"
          else
            EXT="apk"
          fi

          echo "Building with profile: $PROFILE (format: $EXT)..."

          eas build \
            --platform android \
            --local \
            --profile "$PROFILE" \
            --non-interactive \
            --output="../app-release.$EXT"

      - name: 🚀 GitHub Release olarak yayınla
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          TAG="build-${{ github.run_number }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"

          gh release create "$TAG" app-release.* \
            --title "Build #${{ github.run_number }} • ${PROFILE} • ${SHORT_SHA}" \
            --notes "**Branch:** ${{ github.ref_name }}
          **Commit:** ${{ github.sha }}
          **Profile:** ${PROFILE}

          > APK indirmek için aşağıdaki Assets bölümünü kullanın." \
            --prerelease \
            --repo ysports-official/YSPORT

      - name: ✅ Build Summary
        if: success()
        run: |
          echo "## ✅ Build #${{ github.run_number }} Tamamlandı" >> $GITHUB_STEP_SUMMARY
          echo "📦 **Release:** https://github.com/ysports-official/YSPORT/releases/tag/build-${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "⬇️ APK'yı Releases sayfasından indir" >> $GITHUB_STEP_SUMMARY

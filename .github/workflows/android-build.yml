name: EAS Android Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS Build Profile (preview: APK, production: AAB)'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build Android (${{ github.event.inputs.profile || 'preview' }})
    runs-on: self-hosted

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 🚀 Install EAS CLI
        run: npm install -g eas-cli

      - name: 📦 Install Project Dependencies
        working-directory: ./ysports-mobile
        run: npm install --legacy-peer-deps

      - name: 🏗️ EAS Cloud Build + APK URL Al
        shell: bash
        working-directory: ./ysports-mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          echo "EAS cloud build başlatılıyor: $PROFILE..."

          eas build \
            --platform android \
            --profile "$PROFILE" \
            --non-interactive \
            --wait

          EXT="apk"
          if [ "$PROFILE" = "production" ]; then EXT="aab"; fi

          BUILD_URL=$(eas build:list \
            --platform android \
            --limit 1 \
            --status finished \
            --json \
            --non-interactive 2>/dev/null | \
            node -e "
              let d='';
              process.stdin.on('data',c=>d+=c);
              process.stdin.on('end',()=>{
                const b=JSON.parse(d);
                process.stdout.write(b[0]?.artifacts?.buildUrl||b[0]?.artifacts?.applicationArchiveUrl||'');
              });
            "
          )

          echo "BUILD_URL=$BUILD_URL" >> $GITHUB_ENV
          echo "BUILD_EXT=$EXT"       >> $GITHUB_ENV
          echo "✅ Build URL: $BUILD_URL"

      - name: 📥 APK İndir
        shell: bash
        run: |
          if [ -z "$BUILD_URL" ]; then
            echo "HATA: Build URL boş!"
            exit 1
          fi
          curl -L --retry 5 --retry-delay 10 "$BUILD_URL" -o "./app-release.$BUILD_EXT"
          ls -lh app-release.*

      - name: 🚀 GitHub Release olarak yayınla
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          TAG="build-${{ github.run_number }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"

          gh release create "$TAG" app-release.* \
            --title "Build #${{ github.run_number }} • ${PROFILE} • ${SHORT_SHA}" \
            --notes "**Branch:** ${{ github.ref_name }}
          **Commit:** ${{ github.sha }}
          **Profile:** ${PROFILE}

          > APK indirmek için aşağıdaki Assets bölümünü kullanın." \
            --prerelease \
            --repo ysports-official/YSPORT

      - name: ✅ Build Summary
        if: success()
        shell: bash
        run: |
          echo "## ✅ Build #${{ github.run_number }} Tamamlandı" >> $GITHUB_STEP_SUMMARY
          echo "📦 **Release:** https://github.com/ysports-official/YSPORT/releases/tag/build-${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "⬇️ APK'yı Releases sayfasından indir" >> $GITHUB_STEP_SUMMARY

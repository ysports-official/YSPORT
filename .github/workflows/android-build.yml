name: EAS Android Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS Build Profile (preview: APK, production: AAB)'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

permissions:
  contents: write

jobs:
  build:
    name: Build Android (${{ github.event.inputs.profile || 'preview' }})
    runs-on: self-hosted

    steps:
      - name: 🔧 Git Bash PATH (Windows runner)
        shell: powershell
        run: |
          Add-Content $env:GITHUB_PATH "C:\Program Files\Git\bin"
          Add-Content $env:GITHUB_PATH "C:\Program Files\Git\usr\bin"

      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 🚀 Install EAS CLI
        run: npm install -g eas-cli

      - name: 📦 Install Project Dependencies
        working-directory: ./ysports-mobile
        run: npm install --legacy-peer-deps

      - name: 🏗️ EAS Local Build
        shell: bash
        working-directory: ./ysports-mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          EXT="apk"
          if [ "$PROFILE" = "production" ]; then EXT="aab"; fi

          echo "BUILD_EXT=$EXT" >> $GITHUB_ENV

          echo "EAS local build başlatılıyor: $PROFILE..."
          eas build \
            --platform android \
            --profile "$PROFILE" \
            --non-interactive \
            --local \
            --output "../app-release.$EXT"

          ls -lh ../app-release.*

      - name: 🚀 GitHub Release olarak yayınla
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          TAG="build-${{ github.run_number }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"

          gh release create "$TAG" app-release.* \
            --title "Build #${{ github.run_number }} • ${PROFILE} • ${SHORT_SHA}" \
            --notes "**Branch:** ${{ github.ref_name }}
          **Commit:** ${{ github.sha }}
          **Profile:** ${PROFILE}

          > APK indirmek için aşağıdaki Assets bölümünü kullanın." \
            --prerelease \
            --repo ysports-official/YSPORT

      - name: ✅ Build Summary
        if: success()
        shell: bash
        run: |
          echo "## ✅ Build #${{ github.run_number }} Tamamlandı" >> $GITHUB_STEP_SUMMARY
          echo "📦 **Release:** https://github.com/ysports-official/YSPORT/releases/tag/build-${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "⬇️ APK'yı Releases sayfasından indir" >> $GITHUB_STEP_SUMMARY
